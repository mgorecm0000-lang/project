<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
    </div>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div class="lotto-display">
            <span class="lotto-number">?</span>
            <span class="lotto-number">?</span>
            <span class="lotto-number">?</span>
            <span class="lotto-number">?</span>
            <span class="lotto-number">?</span>
            <span class="lotto-number">?</span>
        </div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div class="container contact-form">
        <h2>Partnership Inquiry</h2>
        <form action="https://formspree.io/f/xaqvqznr" method="POST">
            <label for="email">Your Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="6" required></textarea>
            <button type="submit">Send</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
